<!doctype html>
<html lang="is">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#22c55e" />
  <title>Fótboltavaktin</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="ball" aria-hidden="true">⚽</div>
          <div>
            <p class="eyebrow">Íslenski boltinn · v2.6</p>
            <h1>Fótboltavaktin</h1>
          </div>
        </div>
        <div class="hero-actions"><button id="installBtn" class="ghost-btn hidden" type="button">Setja á heimaskjá</button><button id="themeBtn" class="ghost-btn" type="button">Ljós stilling</button><button id="refreshBtn" class="ghost-btn" type="button">Uppfæra</button></div>
      </div>
      <div class="status-strip" id="statusStrip"><span>Hleð gögn…</span></div>
    </header>

    <main>
      <section class="controls" aria-label="Síur">
        <div class="tabs" role="tablist" aria-label="Veldu sýn">
          <button class="tab" data-filter="now">Í gangi</button>
          <button class="tab" data-filter="today">Í dag</button>
          <button class="tab" data-filter="upcoming">Næst</button>
          <button class="tab" data-filter="results">Úrslit</button>
          <button class="tab active" data-filter="all">Allt</button>
        </div>
        <div class="search-row single-search">
          <label class="search-label">
            <span>Leita</span>
            <input id="searchInput" type="search" placeholder="Lið, völlur eða deild…" autocomplete="off" />
          </label>
          <div class="auto-live-note">
            <span>Sjálfvirk live-vakt</span>
            <strong>Engin mín lið / mínar deildir nauðsynleg</strong>
          </div>
        </div>
      </section>

      <section class="summary-grid" aria-live="polite">
        <button class="metric action-metric" type="button" data-filter-jump="now"><strong id="metricNow">0</strong><span>í gangi</span></button>
        <button class="metric action-metric" type="button" data-filter-jump="today"><strong id="metricToday">0</strong><span>í dag</span></button>
        <button class="metric action-metric" type="button" data-filter-jump="results"><strong id="metricResults">0</strong><span>úrslit</span></button>
        <button class="metric action-metric" type="button" data-filter-jump="all"><strong id="metricTotal">0</strong><span>leikir sóttir</span></button>
      </section>

      <section class="live-center" id="liveCenter" aria-live="polite"></section>
      <section class="matchday-dashboard" id="matchdayDashboard" aria-live="polite"></section>
      <section class="topten-dashboard" id="topTenDashboard" aria-live="polite"></section>
      <section class="daily-stars" id="dailyStars" aria-live="polite"></section>
      <section class="league-picker" id="leagueStrip" aria-label="Veldu deild"></section>
      <section class="competition-overview" id="competitionOverview" aria-live="polite"></section>
      <section class="cards" id="cards" aria-live="polite"></section>
      <section class="empty hidden" id="emptyState">
        <div>🔎</div>
        <h2>Engir leikir fundust í þessari síu</h2>
        <p>Prófaðu „Næst“, „Allt“, hreinsaðu leitina eða ýttu á Uppfæra.</p>
      </section>
    </main>
  </div>

  <dialog id="matchDialog" class="match-dialog">
    <div class="dialog-inner">
      <button class="dialog-close" id="closeDialog" type="button" aria-label="Loka">×</button>
      <div id="detailContent" class="detail-content"></div>
    </div>
  </dialog>

  <template id="matchTemplate">
    <article class="match-card">
      <button class="match-open" type="button">
        <div class="match-main">
          <div class="time-block">
            <span class="status-pill"></span>
            <strong class="time"></strong>
            <small class="date"></small>
          </div>
          <div class="teams">
            <h2><span class="home"></span><span class="score-inline"></span><span class="dash">–</span><span class="away"></span></h2>
            <p class="meta"></p>
          </div>
        </div>
      </button>
      <div class="match-footer">
        <span class="source"></span>
        <div class="footer-actions">
          <button class="mini-btn detail-btn" type="button">Opna Match Center</button>
          <a class="source-link" target="_blank" rel="noopener noreferrer">Heimild</a>
        </div>
      </div>
    </article>
  </template>

  <div id="toastStack" class="toast-stack" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
